<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authentication | Eduronix</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=MuseoModerno:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #0F172A;
      color: #F8FAFC;
    }
    .logo-text {
      font-family: 'MuseoModerno', sans-serif;
      font-weight: 700;
    }
    .brand-gradient {
      background: linear-gradient(135deg, #8BC34A 0%, #03A9F4 100%);
    }
    .brand-text-gradient {
      background: linear-gradient(135deg, #8BC34A 0%, #03A9F4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .glass-card {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .edu-role-card {
      background: #1E293B;
      border: 1.5px solid #334155;
      border-radius: 12px;
      padding: 16px 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }
    .edu-role-card:hover, .edu-role-card.sel {
      border-color: #8BC34A;
      background: rgba(139, 195, 74, 0.08);
    }
    .edu-role-card.sel::after {
      content: '✓';
      position: absolute;
      top: 8px;
      right: 12px;
      color: #8BC34A;
      font-weight: 700;
      font-size: 14px;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
  
  <!-- Back button -->
  <a href="index.html" class="absolute top-6 left-6 flex items-center gap-2 px-4 py-2 rounded-xl bg-slate-800/80 border border-slate-700 hover:bg-slate-700 transition">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
    </svg>
    <span>Home</span>
  </a>

  <!-- Ambient BG Blobs -->
  <div class="absolute -top-40 -right-40 w-96 h-96 bg-[#8BC34A]/10 rounded-full blur-[120px] pointer-events-none"></div>
  <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-[#03A9F4]/10 rounded-full blur-[120px] pointer-events-none"></div>

  <!-- Main Container -->
  <div class="w-full max-w-md glass-card rounded-[2rem] shadow-2xl p-8 md:p-10 z-10 transition duration-300">
    <div class="text-center mb-8">
      <div class="logo-text text-3xl uppercase tracking-tight text-white mb-2">EDURONIX</div>
      <h2 class="text-xl font-bold text-slate-200" id="authTitle">Sign In Required</h2>
      <p class="text-slate-400 text-xs mt-1" id="authSubtitle">Please log in or create an account to proceed.</p>
    </div>

    <!-- Error/Alert Display -->
    <div id="authErrorMsg" class="hidden text-red-400 text-xs font-semibold bg-red-950/30 border border-red-800/30 rounded-xl p-4 mb-4 text-center"></div>

    <!-- Name Container (Sign Up Only) -->
    <div id="authNameContainer" class="hidden mb-4">
      <label class="block text-xs font-bold text-slate-400 uppercase tracking-wide mb-1">Full Name</label>
      <input type="text" id="authName" placeholder="John Doe" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-[#8BC34A] transition">
    </div>

    <!-- Email Input -->
    <div class="mb-4">
      <label class="block text-xs font-bold text-slate-400 uppercase tracking-wide mb-1">Email Address</label>
      <input type="email" id="authEmail" placeholder="you@example.com" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-[#8BC34A] transition">
    </div>

    <!-- Password Input -->
    <div class="mb-4">
      <label class="block text-xs font-bold text-slate-400 uppercase tracking-wide mb-1">Password</label>
      <input type="password" id="authPass" placeholder="••••••••" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-[#8BC34A] transition">
    </div>

    <!-- Confirm Password Input (Sign Up Only) -->
    <div id="authConfirmPassContainer" class="hidden mb-4">
      <label class="block text-xs font-bold text-slate-400 uppercase tracking-wide mb-1">Confirm Password</label>
      <input type="password" id="authConfirmPass" placeholder="••••••••" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-[#8BC34A] transition">
    </div>

    <!-- Role Selection (Sign Up Only) -->
    <div id="authRoleContainer" class="hidden mb-6">
      <label class="block text-xs font-bold text-slate-400 uppercase tracking-wide mb-2">Select Your Role</label>
      <div class="grid grid-cols-2 gap-4">
        <div id="roleCardStudent" onclick="selectRole('student')" class="edu-role-card sel">
          <div class="text-2xl mb-1">🎓</div>
          <div class="text-sm font-bold text-white">Student</div>
        </div>
        <div id="roleCardMentor" onclick="selectRole('mentor')" class="edu-role-card">
          <div class="text-2xl mb-1">🚀</div>
          <div class="text-sm font-bold text-white">Mentor</div>
        </div>
      </div>
    </div>

    <!-- Submit Button -->
    <button id="authSubmitBtn" onclick="handleAuthSubmit()" class="w-full brand-gradient text-slate-950 font-bold py-4 rounded-xl text-md transition duration-150 shadow-lg hover:opacity-90 active:scale-[0.98]">
      Login
    </button>

    <div class="flex items-center my-4">
      <div class="flex-grow border-t border-slate-700"></div>
      <span class="mx-3 text-[10px] text-slate-500 font-bold uppercase tracking-wider">or</span>
      <div class="flex-grow border-t border-slate-700"></div>
    </div>

    <!-- Google Login -->
    <button id="authGoogleBtn" onclick="handleGoogleLogin()" class="w-full bg-slate-800 border border-slate-700 hover:bg-slate-700 text-slate-200 font-bold py-4 rounded-xl transition duration-150 flex justify-center items-center gap-2">
      <svg class="h-4 w-4" viewBox="0 0 24 24">
        <path fill="#EA4335" d="M12 5.04c1.66 0 3.2.57 4.38 1.69l3.27-3.27C17.67 1.54 14.98 1 12 1 7.35 1 3.37 3.67 1.39 7.56l3.85 2.99c.92-2.75 3.48-4.51 6.76-4.51z"/>
        <path fill="#4285F4" d="M23.49 12.27c0-.81-.07-1.59-.2-2.34H12v4.47h6.46c-.28 1.48-1.12 2.74-2.38 3.58l3.69 2.87c2.16-1.99 3.42-4.92 3.42-8.58z"/>
        <path fill="#FBBC05" d="M5.24 14.55c-.24-.72-.38-1.49-.38-2.3s.14-1.58.38-2.3L1.39 6.96C.5 8.78 0 10.83 0 13s.5 4.22 1.39 6.04l3.85-3.49z"/>
        <path fill="#34A853" d="M12 23c3.24 0 5.97-1.07 7.96-2.92l-3.69-2.87c-1.02.68-2.33 1.09-4.27 1.09-3.28 0-5.84-1.76-6.76-4.51L1.39 17.2C3.37 20.33 7.35 23 12 23z"/>
      </svg>
      Continue with Google
    </button>

    <p class="text-center text-xs text-slate-400 mt-6" id="authToggleLinkContainer">
      New here? <a href="#" onclick="event.preventDefault(); toggleAuthMode()" class="text-[#03A9F4] font-bold hover:underline">Create an Account</a>
    </p>
  </div>

  <script>
    const supabaseUrl = "https://mnbyvbhfkrkkmmgkedch.supabase.co";
    const supabaseKey = "sb_publishable_6Y-dqTHFSvMWoO-vcnqfiw_tvp9X3qB";
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    let isSignUpMode = false;
    let selectedRole = 'student';

    // Parse parameters
    const urlParams = new URLSearchParams(window.location.search);
    const redirectUrl = urlParams.get('redirect');
    const mode = urlParams.get('mode');

    // Contextual override on landing
    if (redirectUrl) {
      const lowerRedirect = redirectUrl.toLowerCase();
      if (lowerRedirect.includes('mentorform')) {
        selectedRole = 'mentor';
        isSignUpMode = true; // Auto-default to registration mode for mentors
      } else if (lowerRedirect.includes('booking') || lowerRedirect.includes('3booking')) {
        selectedRole = 'student';
      }
    }

    if (mode === 'signup') {
      isSignUpMode = true;
    }

    function toggleAuthMode(forceMode) {
      if (typeof forceMode === 'boolean') {
        isSignUpMode = forceMode;
      } else {
        isSignUpMode = !isSignUpMode;
      }
      const nameCont = document.getElementById('authNameContainer');
      const confirmCont = document.getElementById('authConfirmPassContainer');
      const roleCont = document.getElementById('authRoleContainer');
      const titleText = document.getElementById('authTitle');
      const subtitleText = document.getElementById('authSubtitle');
      const submitBtn = document.getElementById('authSubmitBtn');
      const toggleLink = document.getElementById('authToggleLinkContainer');
      const errorDiv = document.getElementById('authErrorMsg');

      errorDiv.classList.add('hidden');
      errorDiv.textContent = '';

      if (isSignUpMode) {
        nameCont.classList.remove('hidden');
        confirmCont.classList.remove('hidden');
        roleCont.classList.remove('hidden');
        titleText.textContent = "Create your account";
        subtitleText.textContent = "Sign up to start your journey.";
        submitBtn.textContent = "Sign Up";
        toggleLink.innerHTML = 'Already have an account? <a href="#" onclick="event.preventDefault(); toggleAuthMode()" class="text-[#03A9F4] font-bold hover:underline">Log In</a>';
        selectRole(selectedRole);
      } else {
        nameCont.classList.add('hidden');
        confirmCont.classList.add('hidden');
        roleCont.classList.add('hidden');
        titleText.textContent = "Sign In Required";
        subtitleText.textContent = "Please log in or create an account to proceed.";
        submitBtn.textContent = "Login";
        toggleLink.innerHTML = 'New here? <a href="#" onclick="event.preventDefault(); toggleAuthMode()" class="text-[#03A9F4] font-bold hover:underline">Create an Account</a>';
      }
    }

    function selectRole(role) {
      selectedRole = role;
      const studentCard = document.getElementById('roleCardStudent');
      const mentorCard = document.getElementById('roleCardMentor');
      if (role === 'student') {
        studentCard.classList.add('sel');
        mentorCard.classList.remove('sel');
      } else {
        mentorCard.classList.add('sel');
        studentCard.classList.remove('sel');
      }
    }

    async function handleAuthSubmit() {
      if (isSignUpMode) {
        await handleSignUp();
      } else {
        await handleLogin();
      }
    }

    async function handleLogin() {
      const email = document.getElementById('authEmail').value.trim();
      const pass = document.getElementById('authPass').value.trim();
      const btn = document.getElementById('authSubmitBtn');
      const errorDiv = document.getElementById('authErrorMsg');

      errorDiv.classList.add('hidden');
      errorDiv.textContent = '';

      if (!email || !pass) {
        errorDiv.textContent = 'Please enter your email and password.';
        errorDiv.classList.remove('hidden');
        return;
      }

      btn.textContent = 'Signing in...';
      btn.disabled = true;

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
        if (error) {
          errorDiv.textContent = error.message;
          errorDiv.classList.remove('hidden');
          btn.textContent = 'Login';
          btn.disabled = false;
          return;
        }

        await completeRedirection(data.user.id);
      } catch (err) {
        errorDiv.textContent = 'An unexpected error occurred. Please try again.';
        errorDiv.classList.remove('hidden');
        btn.textContent = 'Login';
        btn.disabled = false;
      }
    }

    async function handleSignUp() {
      const name = document.getElementById('authName').value.trim();
      const email = document.getElementById('authEmail').value.trim();
      const pass = document.getElementById('authPass').value.trim();
      const confirmPass = document.getElementById('authConfirmPass').value.trim();
      const btn = document.getElementById('authSubmitBtn');
      const errorDiv = document.getElementById('authErrorMsg');

      errorDiv.classList.add('hidden');
      errorDiv.textContent = '';

      if (!name || !email || !pass || !confirmPass) {
        errorDiv.textContent = 'Please fill in all fields.';
        errorDiv.classList.remove('hidden');
        return;
      }

      if (pass !== confirmPass) {
        errorDiv.textContent = 'Passwords do not match.';
        errorDiv.classList.remove('hidden');
        return;
      }

      if (pass.length < 6) {
        errorDiv.textContent = 'Password must be at least 6 characters.';
        errorDiv.classList.remove('hidden');
        return;
      }

      btn.textContent = 'Creating account...';
      btn.disabled = true;

      try {
        const { data, error } = await supabaseClient.auth.signUp({
          email,
          password: pass,
          options: {
            data: {
              full_name: name
            }
          }
        });

        if (error) {
          errorDiv.textContent = error.message;
          errorDiv.classList.remove('hidden');
          btn.textContent = 'Sign Up';
          btn.disabled = false;
          return;
        }

        const user = data.user;
        if (!user) {
          errorDiv.textContent = 'Registration successful! Check your email for a confirmation link.';
          errorDiv.classList.remove('hidden');
          btn.textContent = 'Sign Up';
          btn.disabled = false;
          return;
        }

        // Insert custom role profile row
        const { error: profileErr } = await supabaseClient
          .from('profiles')
          .upsert({
            id: user.id,
            full_name: name,
            role: selectedRole
          });

        if (profileErr) console.error("Error creating profile:", profileErr);

        await completeRedirection(user.id);
      } catch (err) {
        console.error("Sign up exception:", err);
        errorDiv.textContent = 'An unexpected error occurred. Please try again.';
        errorDiv.classList.remove('hidden');
        btn.textContent = 'Sign Up';
        btn.disabled = false;
      }
    }

    async function handleGoogleLogin() {
      const btn = document.getElementById('authGoogleBtn');
      btn.disabled = true;

      // Cache desired role in local storage
      localStorage.setItem('eduronix_oauth_role', selectedRole);

      // Handle redirect back to callback page
      const currentOrigin = window.location.origin + window.location.pathname;
      const finalRedirectUrl = redirectUrl 
        ? `${currentOrigin}?redirect=${encodeURIComponent(redirectUrl)}`
        : currentOrigin;

      try {
        const { error } = await supabaseClient.auth.signInWithOAuth({
          provider: 'google',
          options: {
            redirectTo: finalRedirectUrl
          }
        });
        if (error) throw error;
      } catch (err) {
        console.error("Google sign in failed:", err);
        alert("Google sign in failed: " + err.message);
        btn.disabled = false;
      }
    }

    async function completeRedirection(userId) {
      // If there is an explicit target redirect, use it
      if (redirectUrl) {
        window.location.href = redirectUrl;
        return;
      }

      // Default fallback: Fetch profile role
      try {
        const { data: profiles, error } = await supabaseClient
          .from('profiles')
          .select('role')
          .eq('id', userId);

        if (!error && profiles && profiles.length > 0) {
          const role = profiles[0].role;
          if (role === 'admin') window.location.href = 'admin-dashboard.html';
          else if (role === 'mentor') window.location.href = 'mentor-dashboard.html';
          else window.location.href = 'student-dashboard.html';
        } else {
          window.location.href = 'index.html';
        }
      } catch (err) {
        window.location.href = 'index.html';
      }
    }

    // Trigger OAuth role retrieval if returning from Google login redirect callback
    window.addEventListener('DOMContentLoaded', async () => {
      // Apply correct initial UI state on load
      toggleAuthMode(isSignUpMode);

      try {
        const { data: { session }, error } = await supabaseClient.auth.getSession();
        if (session && session.user) {
          const user = session.user;

          // Check if profile exists
          const { data: profiles, error: profileErr } = await supabaseClient
            .from('profiles')
            .select('role')
            .eq('id', user.id);

          if (profileErr || !profiles || profiles.length === 0) {
            // New user signed in via Google, fetch cached local storage role
            const fullName = user.user_metadata?.full_name || user.email.split('@')[0];
            let oauthRole = localStorage.getItem('eduronix_oauth_role') || 'student';
            localStorage.removeItem('eduronix_oauth_role');

            await supabaseClient.from('profiles').insert({
              id: user.id,
              full_name: fullName,
              role: oauthRole
            });
          }

          // Complete login redirection
          await completeRedirection(user.id);
        }
      } catch (err) {
        console.error("Callback handler session query failed:", err);
      }
    });
  </script>
</body>
</html>
