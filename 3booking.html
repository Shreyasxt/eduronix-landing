<script>
const supabaseClient = supabase.createClient(
  "https://mnbyvbhfkrkkmmgkedch.supabase.co",
  "sb_publishable_6Y-dqTHFSvMWoO-vcnqfiw_tvp9X3qB"
);

// Toggle "Other" inputs for all three selects
[1, 2, 3].forEach(i => {
    document.getElementById(`college${i}`).addEventListener("change", function () {
        const otherInput = document.getElementById(`otherCollege${i}`);
        if (this.value === "Other") {
            otherInput.classList.remove("hidden");
        } else {
            otherInput.classList.add("hidden");
        }
    });
});

async function handlePayment() {
  const btn = document.getElementById("payBtn");

  const getCollegeValue = (num) => {
      const base = document.getElementById(`college${num}`).value;
      return base === "Other" ? document.getElementById(`otherCollege${num}`).value : base;
  };

  const data = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    email: document.getElementById("email").value,
    college1: getCollegeValue(1),
    college2: getCollegeValue(2),
    college3: getCollegeValue(3),
    course: document.getElementById("course").value,
    gender: document.getElementById("gender").value,
    requirements: document.getElementById("requirements").value,
  };

  if (!data.name || !data.phone || !data.email || !data.college1) {
    alert("Please fill in your name, contact, and at least one college choice.");
    return;
  }

  if (!/^\d{10}$/.test(data.phone)) {
    alert("Enter valid 10-digit phone number");
    return;
  }

  btn.innerText = "Redirecting...";
  btn.disabled = true;

  try {
    const { error } = await supabaseClient
      .from("booking_requests")
      .insert([{
        name: data.name,
        phone: data.phone,
        email: data.email,
        // Storing multiple colleges - ensure your Supabase table has these columns
        college: data.college1, 
        college_alt1: data.college2,
        college_alt2: data.college3,
        course: data.course,
        mentor_gender: data.gender,
        requirements: data.requirements,
        payment_id: "form_redirect_multi",
        status: "pending"
      }]);

    if (error) throw error;

    window.location.href = "https://payments.cashfree.com/forms/eduronixbooking";

  } catch (err) {
    console.error("Supabase Error:", err);
    alert("Error saving data. Please try again.");
    btn.innerText = "Try Again";
    btn.disabled = false;
  }
}
</script>
