<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentor Directory | Eduronix</title>
    
    <link rel="icon" type="image/png" href="glogo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --brand-deep-green: #0A4D34;
            --brand-tech-blue: #03A9F4;
            --brand-light-green: #8BC34A;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #F8FAFC;
            color: #0F172A;
            margin: 0;
            padding: 0;
        }

        .mentor-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #E2E8F0;
        }

        .mentor-card:hover {
            border-color: var(--brand-light-green);
            background-color: #FFFFFF;
            transform: translateY(-2px);
            box-shadow: 0 12px 24px -10px rgba(10, 77, 52, 0.08);
        }

        .glass { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(12px); 
            border-bottom: 1px solid rgba(0,0,0,0.05); 
        }
        
        .brand-gradient-text {
            background: linear-gradient(135deg, #0A4D34 0%, #03A9F4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        [x-cloak] { display: none !important; }
    </style>

    <script>
        function mentorDirectory() {
            return {
                search: '',
                filterType: 'All',
                navOpen: false,
                mentors: Array.from({ length: 12 }, (_, i) => {
                    const dataPoints = [
                        { univ: 'IIT Delhi', stream: 'Engineering', course: 'B.Tech CSE', color: '#0A4D34' },
                        { univ: 'AIIMS Delhi', stream: 'Medical', course: 'MBBS', color: '#03A9F4' },
                        { univ: 'BITS Pilani', stream: 'Engineering', course: 'B.E. Electronics', color: '#8BC34A' },
                        { univ: 'IIM Ahmedabad', stream: 'Management', course: 'IPM (MBA)', color: '#0A4D34' }
                    ];
                    const firstNames = ['Arjun', 'Riya', 'Aditya', 'Isha', 'Kabir'];
                    const lastNames = ['Sharma', 'Verma', 'Patel', 'Reddy'];
                    const randomEntry = dataPoints[i % dataPoints.length];
                    return {
                        id: i,
                        name: `${firstNames[i % 5]} ${lastNames[i % 4]}`,
                        initials: `${firstNames[i % 5][0]}${lastNames[i % 4][0]}`,
                        university: randomEntry.univ,
                        course: randomEntry.course,
                        stream: randomEntry.stream,
                        color: randomEntry.color,
                        rating: (4.3 + Math.random() * 0.7).toFixed(1),
                        year: ['2nd Year', '3rd Year', 'Final Year', 'Post-Grad'][i % 4]
                    };
                }),
                get filteredMentors() {
                    return this.mentors.filter(m => {
                        const s = this.search.toLowerCase();
                        const matchesSearch = m.name.toLowerCase().includes(s) || m.university.toLowerCase().includes(s);
                        const matchesFilter = this.filterType === 'All' || m.stream === this.filterType;
                        return matchesSearch && matchesFilter;
                    });
                }
            }
        }
    </script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="mentorDirectory()">

    <nav class="fixed w-full z-[100] py-3 glass">
        <div class="max-w-7xl mx-auto px-4 md:px-8 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2">
                <div class="max-w-[120px] md:max-w-[150px]">
                    <img src="glogo.png" class="h-8 md:h-10 w-auto object-contain" alt="Logo">
                </div>
                <span class="text-lg md:text-xl font-extrabold tracking-tighter uppercase">Eduronix</span>
            </a>

            <div class="hidden md:flex items-center gap-8">
                <a href="index.html" class="text-[10px] font-bold text-slate-600 uppercase tracking-widest hover:text-[#8BC34A]">Solutions</a>
                <a href="https://docs.google.com/forms/d/e/1FAIpQLSfA4aYRyj4_aArR5oN0kiegvV-eLNTCJ1NMUyP5iM8I4Xel0w/viewform" class="text-[10px] font-bold text-slate-600 uppercase tracking-widest hover:text-[#8BC34A]">Become a Mentor</a>
                <button onclick="window.location.href='comingsoon.html'" class="px-6 py-2 bg-slate-900 text-white rounded-full text-[10px] font-bold uppercase tracking-widest transition-transform hover:scale-105">Get Started</button>
            </div>

            <button @click="navOpen = !navOpen" class="md:hidden p-2 text-slate-900">
                <i :class="navOpen ? 'fas fa-times' : 'fas fa-bars'" class="text-xl"></i>
            </button>
        </div>

        <div x-show="navOpen" 
             x-cloak 
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 -translate-y-4"
             x-transition:enter-end="opacity-100 translate-y-0"
             class="md:hidden bg-white border-t p-6 space-y-4 shadow-2xl">
            <a href="index.html" class="block text-xs font-bold uppercase text-slate-600">Solutions</a>
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSfA4aYRyj4_aArR5oN0kiegvV-eLNTCJ1NMUyP5iM8I4Xel0w/viewform" class="block text-xs font-bold uppercase text-slate-600">Become a Mentor</a>
            <button onclick="window.location.href='comingsoon.html'" class="w-full py-4 bg-slate-900 text-white rounded-xl font-bold uppercase text-xs tracking-widest">Get Started</button>
        </div>
    </nav>

    <header class="pt-24 pb-8 md:pt-36 md:pb-12 bg-white border-b border-slate-100 px-4">
        <div class="max-w-3xl mx-auto text-center">
            <button onclick="history.back()" class="mb-4 inline-flex items-center gap-2 text-[10px] font-black uppercase text-slate-400 hover:text-[#0A4D34] transition-colors">
                <i class="fas fa-arrow-left"></i> Back to home
            </button>
            <h1 class="text-3xl md:text-5xl font-black tracking-tighter mb-8 brand-gradient-text">Verified Mentors</h1>
            
            <div class="flex flex-col md:flex-row gap-3 bg-white p-2 rounded-2xl md:rounded-full shadow-xl border border-slate-100">
                <div class="relative flex-1">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                    <input type="text" x-model="search" placeholder="Search name, college..." 
                           class="w-full pl-10 pr-4 py-3 rounded-xl border-none focus:ring-0 text-sm font-medium text-slate-700 bg-transparent">
                </div>
                <div class="hidden md:block w-px h-8 bg-slate-100 self-center"></div>
                <select x-model="filterType" class="bg-slate-50 md:bg-transparent border-none rounded-xl px-4 py-3 font-bold text-[10px] uppercase text-slate-500 focus:ring-0 cursor-pointer">
                    <option value="All">All Streams</option>
                    <option value="Engineering">Engineering</option>
                    <option value="Medical">Medical</option>
                    <option value="Management">Management</option>
                </select>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-10">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <template x-for="mentor in filteredMentors" :key="mentor.id">
                <div class="mentor-card bg-white p-6 rounded-[2rem] flex flex-col sm:flex-row gap-5 items-center sm:items-start text-center sm:text-left">
                    <div :style="`background-color: ${mentor.color}`" 
                         class="w-16 h-16 rounded-2xl flex-shrink-0 flex items-center justify-center text-white text-xl font-black shadow-lg"
                         x-text="mentor.initials">
                    </div>
                    
                    <div class="flex-1 w-full">
                        <div class="flex justify-between items-center mb-1">
                            <h3 class="text-lg font-extrabold text-slate-900" x-text="mentor.name"></h3>
                            <span class="text-amber-500 text-[10px] font-bold"><i class="fas fa-star"></i> <span x-text="mentor.rating"></span></span>
                        </div>
                        <p class="text-emerald-700 font-bold text-xs mb-3" x-text="mentor.university"></p>
                        
                        <div class="text-[11px] font-semibold text-slate-500 mb-5 space-y-1">
                            <p><i class="fas fa-graduation-cap mr-2 text-slate-300"></i><span x-text="mentor.course"></span></p>
                            <p><i class="fas fa-clock mr-2 text-slate-300"></i><span x-text="mentor.year"></span></p>
                        </div>

                        <button class="w-full py-2.5 bg-slate-900 text-white text-[10px] font-bold uppercase tracking-widest rounded-xl hover:bg-[#03A9F4] transition-colors">View Profile</button>
                    </div>
                </div>
            </template>
        </div>
        
        <div x-show="filteredMentors.length === 0" x-cloak class="text-center py-20">
            <i class="fas fa-search text-4xl text-slate-200 mb-4"></i>
            <p class="text-slate-400 font-bold uppercase text-xs tracking-widest">No mentors found matching your search</p>
        </div>
    </main>

    <footer class="bg-slate-950 text-white py-12 text-center px-4 border-t border-white/5">
        <img src="glogo.png" class="h-8 mx-auto mb-4 object-contain transition-transform hover:scale-110">
        <p class="text-slate-500 text-[9px] font-black uppercase tracking-[0.3em]">© 2026 Eduronix • Built for the next generation</p>
    </footer>

</body>
</html>
